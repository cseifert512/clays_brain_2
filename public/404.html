<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <script>
    (function () {
      var routes = [
        "auar",
        "heatherwick",
        "heatherwick2",
        "heatherwick3",
        "heatherwick4",
        "heatherwick-condensed",
        "heatherwick-interview",
        "heatherwick-reference",
        "resume"
      ];
      var path = window.location.pathname.replace(/\/+$/, "");
      var parts = path.split("/").filter(Boolean);

      if (parts.length === 1) {
        var normalized = parts[0].toLowerCase();
        if (routes.indexOf(normalized) !== -1 && parts[0] !== normalized) {
          window.location.replace("/" + normalized + "/" + window.location.search + window.location.hash);
        }
      }
    }());
  </script>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f6f4ef;
      color: #171614;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
    }

    main {
      max-width: 34rem;
      padding: 2rem;
      text-align: center;
    }

    a {
      color: inherit;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.2em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Page not found</h1>
    <p>If you were looking for AUAR, try <a href="/auar/">claysbrain.com/auar</a>.</p>
  </main>
</body>
</html>
